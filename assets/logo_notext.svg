<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="grad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- transparent outer canvas; rounded rectangle as visible background -->
  <rect x="0" y="0" width="512" height="512" rx="64" ry="64" fill="url(#grad)" filter="url(#shadow)" />

  <!-- Book / ledger icon on the left -->
  <g transform="translate(60,96)">
    <!-- book body -->
    <rect x="0" y="0" width="224" height="320" rx="20" ry="20" fill="#ffffff" fill-opacity="0.12" />
    <!-- spine -->
    <rect x="0" y="0" width="36" height="320" rx="12" ry="12" fill="#ffffff" fill-opacity="0.18" />
    <!-- horizontal lines (entries) -->
    <g fill="#ffffff" fill-opacity="0.9" transform="translate(56,48)">
      <rect x="0" y="0" width="136" height="10" rx="5" />
      <rect x="0" y="28" width="112" height="10" rx="5" />
      <rect x="0" y="56" width="88" height="10" rx="5" />
    </g>
    <!-- token dots floating above the book (multi-agent tokens) -->
    <circle cx="200" cy="40" r="12" fill="#fff" fill-opacity="0.95" />
    <circle cx="220" cy="80" r="8" fill="#fff" fill-opacity="0.9" />
    <circle cx="180" cy="110" r="6" fill="#fff" fill-opacity="0.85" />
  </g>

</svg>
