<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="360" viewBox="0 0 1080 360" role="img" aria-labelledby="title desc">
  <title id="title">OpenCode Ledger logo</title>
  <desc id="desc">OpenCode Ledger wordmark with a connected ledger and AI agent node symbol.</desc>
  <defs>
    <linearGradient id="tile" x1="62" y1="44" x2="294" y2="316" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#15171C"/>
      <stop offset="0.52" stop-color="#101B1A"/>
      <stop offset="1" stop-color="#211A10"/>
    </linearGradient>
    <linearGradient id="page" x1="112" y1="78" x2="258" y2="282" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#DDE7E4" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="accent" x1="116" y1="92" x2="270" y2="270" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00E5FF"/>
      <stop offset="0.54" stop-color="#8CFF5E"/>
      <stop offset="1" stop-color="#FFB020"/>
    </linearGradient>
    <linearGradient id="wordAccent" x1="396" y1="80" x2="760" y2="238" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00E5FF"/>
      <stop offset="0.55" stop-color="#8CFF5E"/>
      <stop offset="1" stop-color="#FFB020"/>
    </linearGradient>
    <filter id="softShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.24"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(40 36)">
    <rect x="0" y="0" width="288" height="288" rx="60" fill="url(#tile)" filter="url(#softShadow)"/>
    <path d="M58 88C58 66.5 75.5 49 97 49H214C233.3 49 249 64.7 249 84V204C249 225.5 231.5 243 210 243H93C73.7 243 58 227.3 58 208V88Z" fill="url(#page)" opacity="0.16"/>
    <path d="M93 48H209C230 48 247 65 247 86V204C247 225 230 242 209 242H93C76.4 242 63 228.6 63 212V78C63 61.4 76.4 48 93 48Z" fill="none" stroke="#E9F7F2" stroke-opacity="0.42" stroke-width="6"/>
    <path d="M98 48V242" stroke="#E9F7F2" stroke-opacity="0.26" stroke-width="6" stroke-linecap="round"/>

    <g opacity="0.88" stroke="#E9F7F2" stroke-width="6" stroke-linecap="round">
      <path d="M126 96H192"/>
      <path d="M126 128H216"/>
      <path d="M126 160H184"/>
      <path d="M126 192H210"/>
    </g>

    <path d="M119 203L151 147L187 172L224 102" fill="none" stroke="url(#accent)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
    <circle cx="119" cy="203" r="15" fill="#111315" stroke="#00E5FF" stroke-width="7"/>
    <circle cx="151" cy="147" r="15" fill="#111315" stroke="#8CFF5E" stroke-width="7"/>
    <circle cx="187" cy="172" r="15" fill="#111315" stroke="#FFB020" stroke-width="7"/>
    <circle cx="224" cy="102" r="15" fill="#111315" stroke="#00E5FF" stroke-width="7"/>
    <g fill="#FFFFFF" fill-opacity="0.92">
      <circle cx="119" cy="203" r="4"/>
      <circle cx="151" cy="147" r="4"/>
      <circle cx="187" cy="172" r="4"/>
      <circle cx="224" cy="102" r="4"/>
    </g>
  </g>

  <g transform="translate(382 92)">
    <text x="0" y="74" font-family="Avenir Next" font-size="78" font-weight="800" letter-spacing="0" fill="#111315">OpenCode</text>
    <text x="0" y="154" font-family="Avenir Next" font-size="78" font-weight="800" letter-spacing="0" fill="url(#wordAccent)">Ledger</text>
    <text x="2" y="206" font-family="Avenir Next" font-size="24" font-weight="700" letter-spacing="3" fill="#4F5A58">MULTI-AGENT COST INTELLIGENCE</text>
  </g>
</svg>
