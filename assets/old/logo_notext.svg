<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">OpenCode Ledger mark</title>
  <desc id="desc">A modern ledger icon with connected AI agent nodes and token entries.</desc>
  <defs>
    <linearGradient id="tile" x1="76" y1="54" x2="438" y2="456" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#15171C"/>
